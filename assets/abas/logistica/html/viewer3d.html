<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Viewer 3D - Visya</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #020617;
        color: #e5e7eb;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .info {
        text-align: center;
        max-width: 420px;
        padding: 12px 16px;
        border-radius: 8px;
        border: 1px solid #374151;
        background: radial-gradient(circle at top, #111827 0, #020617 70%);
        box-shadow: 0 10px 25px rgba(15, 23, 42, 0.55);
      }

      .info h1 {
        margin: 0 0 6px;
        font-size: 1rem;
        font-weight: 600;
        color: #f9fafb;
      }

      .info p {
        margin: 0;
        font-size: 0.82rem;
        color: #9ca3af;
      }
    </style>
  </head>
  <body>
    <div class="info">
      <h1>Viewer 3D (placeholder)</h1>
      <p>
        A tela de montagem envia os dados da carga para cá via postMessage.
        Em breve entra o 3D real.
      </p>
    </div>

    <script>
      // Apenas loga o payload por enquanto
      window.addEventListener("message", event => {
        if (!event.data || event.data.type !== "LOAD_CARGA") return;
        console.log("[VIEWER3D] carga recebida:", event.data.payload);
      });
    </script>
  </body>
</html>
